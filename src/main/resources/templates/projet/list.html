<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Projets')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-folder me-2"></i>Projets</h2>
        <a th:href="@{/projets/nouveau}" class="btn btn-primary" sec:authorize="hasRole('ADMINISTRATEUR')">
            <i class="bi bi-plus-circle me-1"></i>Nouveau projet
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filtre statut -->
    <div class="d-flex gap-2 mb-3 flex-wrap">
        <a th:href="@{/projets}" class="btn btn-sm"
           th:classappend="${statutFiltre == null} ? 'btn-primary' : 'btn-outline-secondary'">Tous</a>
        <a th:each="s : ${statuts}"
           th:href="@{/projets(statut=${s})}"
           class="btn btn-sm"
           th:classappend="${statutFiltre == s} ? 'btn-primary' : 'btn-outline-secondary'"
           th:text="${s}"></a>
    </div>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-primary">
            <tr>
                <th>#</th>
                <th>Titre</th>
                <th>Type</th>
                <th>Statut</th>
                <th>Étudiant</th>
                <th>Encadrant</th>
                <th>Résultat</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${projets.content}">
                <td class="text-muted small" th:text="${p.id}"></td>
                <td>
                    <a th:href="@{/projets/{id}(id=${p.id})}" class="fw-semibold text-decoration-none"
                       th:text="${p.titre}"></a>
                </td>
                <td>
                    <span class="badge bg-info text-dark" th:text="${p.type}"></span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${p.statut.name() == 'EN_COURS'} ? 'bg-success'
                                        : (${p.statut.name() == 'PROPOSE'} ? 'bg-warning text-dark'
                                        : (${p.statut.name() == 'SOUTENU'} ? 'bg-primary' : 'bg-secondary'))"
                          th:text="${p.statut}"></span>
                </td>
                <td th:text="${p.etudiant != null ? p.etudiant.nom + ' ' + p.etudiant.prenom : '—'}"></td>
                <td th:text="${p.encadrantAcademique != null ? p.encadrantAcademique.nom + ' ' + p.encadrantAcademique.prenom : '—'}"></td>
                <td th:text="${p.resultatFinal != null ? p.resultatFinal + '/20' : '—'}"></td>
                <td>
                    <div class="d-flex gap-1">
                        <a th:href="@{/projets/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary"
                           title="Voir">
                            <i class="bi bi-eye"></i>
                        </a>
                        <a th:href="@{/projets/{id}/modifier(id=${p.id})}" class="btn btn-sm btn-outline-secondary"
                           sec:authorize="hasAnyRole('ADMINISTRATEUR','ENCADRANT_ACADEMIQUE')" title="Modifier">
                            <i class="bi bi-pencil"></i>
                        </a>
                    </div>
                </td>
            </tr>
            <tr th:if="${projets.empty}">
                <td colspan="8" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-3 d-block mb-1"></i>Aucun projet trouvé
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav th:if="${projets.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${projets.first} ? 'disabled'">
                <a class="page-link" th:href="@{/projets(page=${projets.number - 1})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, projets.totalPages - 1)}"
                th:classappend="${i == projets.number} ? 'active'">
                <a class="page-link" th:href="@{/projets(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${projets.last} ? 'disabled'">
                <a class="page-link" th:href="@{/projets(page=${projets.number + 1})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
