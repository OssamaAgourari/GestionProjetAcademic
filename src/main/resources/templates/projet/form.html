<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${editMode ? 'Modifier projet' : 'Nouveau projet'})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container" style="max-width:720px">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>
            <i class="bi bi-folder-plus me-2" th:if="${!editMode}"></i>
            <i class="bi bi-pencil-square me-2" th:if="${editMode}"></i>
            <span th:text="${editMode ? 'Modifier le projet' : 'Nouveau projet'}"></span>
        </h2>
        <a th:href="${editMode} ? @{/projets/{id}(id=${projet.id})} : @{/projets}"
           class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Retour
        </a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="${editMode} ? @{/projets/{id}/modifier(id=${projet.id})} : @{/projets/nouveau}"
                  method="post" novalidate>

                <!-- Titre -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Titre <span class="text-danger">*</span></label>
                    <input type="text" name="titre" class="form-control"
                           th:value="${editMode ? projet.titre : ''}"
                           required maxlength="255" placeholder="Titre du projet"/>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" class="form-control" rows="3"
                              placeholder="Description du projet"
                              th:text="${editMode ? projet.description : ''}"></textarea>
                </div>

                <!-- Champs uniquement à la création -->
                <div th:if="${!editMode}">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Type <span class="text-danger">*</span></label>
                            <select name="type" class="form-select" required>
                                <option value="">-- Sélectionner --</option>
                                <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Lieu de stage</label>
                            <input type="text" name="lieuStage" class="form-control" placeholder="ex: Casablanca"/>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Étudiant <span class="text-danger">*</span></label>
                        <select name="etudiantId" class="form-select" required>
                            <option value="">-- Sélectionner un étudiant --</option>
                            <option th:each="e : ${etudiants}"
                                    th:value="${e.id}"
                                    th:text="${e.nom + ' ' + e.prenom + ' — ' + e.matricule}"></option>
                        </select>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Encadrant académique <span class="text-danger">*</span></label>
                            <select name="encadrantAcademiqueId" class="form-select" required>
                                <option value="">-- Sélectionner --</option>
                                <option th:each="e : ${encadrantsAcademiques}"
                                        th:value="${e.id}"
                                        th:text="${e.nom + ' ' + e.prenom}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Encadrant professionnel</label>
                            <select name="encadrantProfessionnelId" class="form-select">
                                <option value="">-- Aucun --</option>
                                <option th:each="e : ${encadrantsProfessionnels}"
                                        th:value="${e.id}"
                                        th:text="${e.nom + ' ' + e.prenom}"></option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Dates (create + edit) -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Date de début</label>
                        <input type="date" name="dateDebut" class="form-control"
                               th:value="${editMode ? projet.dateDebut : ''}"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Date de fin prévue</label>
                        <input type="date" name="dateFinPrevue" class="form-control"
                               th:value="${editMode ? projet.dateFinPrevue : ''}"/>
                    </div>
                </div>

                <!-- Lieu de stage (edit only) -->
                <div class="mb-4" th:if="${editMode}">
                    <label class="form-label fw-semibold">Lieu de stage</label>
                    <input type="text" name="lieuStage" class="form-control"
                           th:value="${projet.lieuStage}" placeholder="ex: Casablanca"/>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-1"></i>
                        <span th:text="${editMode ? 'Enregistrer les modifications' : 'Créer le projet'}"></span>
                    </button>
                    <a th:href="${editMode} ? @{/projets/{id}(id=${projet.id})} : @{/projets}"
                       class="btn btn-outline-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
