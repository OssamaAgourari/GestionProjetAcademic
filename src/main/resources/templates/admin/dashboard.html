<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Tableau de bord')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <h2 class="mb-4"><i class="bi bi-speedometer2 me-2"></i>Tableau de bord Admin</h2>
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="small">Total projets</div>
                            <div class="fs-3 fw-bold" th:text="${totalProjets}">0</div>
                        </div>
                        <i class="bi bi-folder2-open fs-2"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="small">Proposés</div>
                            <div class="fs-3 fw-bold" th:text="${projetsPropose}">0</div>
                        </div>
                        <i class="bi bi-hourglass-split fs-2"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="small">En cours</div>
                            <div class="fs-3 fw-bold" th:text="${projetsEnCours}">0</div>
                        </div>
                        <i class="bi bi-arrow-repeat fs-2"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-secondary">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="small">Soutenus</div>
                            <div class="fs-3 fw-bold" th:text="${projetsSoutenus}">0</div>
                        </div>
                        <i class="bi bi-patch-check fs-2"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <h5>Projets récents</h5>
    <div class="table-responsive">
        <table class="table table-hover table-sm">
            <thead class="table-light">
            <tr>
                <th>#</th><th>Titre</th><th>Type</th><th>Statut</th><th>Étudiant</th><th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${projets}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.titre}"></td>
                <td><span class="badge bg-info" th:text="${p.type}"></span></td>
                <td>
                    <span class="badge"
                          th:classappend="${p.statut.name() == 'EN_COURS'} ? 'bg-success' : (${p.statut.name() == 'PROPOSE'} ? 'bg-warning text-dark' : 'bg-secondary')"
                          th:text="${p.statut}"></span>
                </td>
                <td th:text="${p.etudiant?.nom + ' ' + p.etudiant?.prenom}"></td>
                <td>
                    <a th:href="@{/projets/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-eye"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(projets)}">
                <td colspan="6" class="text-center text-muted">Aucun projet</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
